name: Build n2n

on:
  # ── 由 check-release.yml 触发（或手动执行）────────────────────────
  workflow_dispatch:
    inputs:
      tag:
        description: 'n2n upstream tag to build (e.g. 3.1.1)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']
      release_name:
        description: 'Release display name (copied from upstream)'
        required: false
        type: string
      release_body:
        description: 'Release notes (copied from upstream)'
        required: false
        type: string

  # ── 首次推送 build.yml 到主分支时，自动编译当前上游最新的 stable + prerelease ──
  push:
    branches:
      - main   # ← 改成你的默认分支名
    paths:
      - '.github/workflows/build.yml'

# ─────────────────────────────────────────────────────────────────────────────
# 编译目标：
#   Linux   x86 / amd64 / arm64
#   Windows amd64
#   macOS   arm64 (Apple Silicon M1+)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # 1. 初始化：获取要编译的 tag（push 触发时自动查询上游）
  # ════════════════════════════════════════════════════════════════════════════
  init:
    name: Resolve tags to build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Determine tags
        id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            IS_PRE="${{ github.event.inputs.prerelease }}"
            RNAME="${{ github.event.inputs.release_name }}"
            RBODY=$(printf '%s' "${{ github.event.inputs.release_body }}" | \
                    python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            MATRIX=$(jq -cn \
              --arg tag "$TAG" \
              --argjson pre "$( [ "$IS_PRE" = "true" ] && echo true || echo false )" \
              --arg name "$RNAME" \
              --argjson body "$RBODY" \
              '{include:[{tag:$tag, prerelease:$pre, release_name:$name, release_body:$body}]}')
          else
            STABLE=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/ntop/n2n/releases/latest")
            STABLE_TAG=$(echo "$STABLE" | jq -r '.tag_name')
            STABLE_NAME=$(echo "$STABLE" | jq -r '.name')
            STABLE_BODY=$(echo "$STABLE" | jq '.body // ""')

            RELEASES=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/ntop/n2n/releases?per_page=30")
            PRE=$(echo "$RELEASES" | \
              jq '[.[] | select(.prerelease==true and .draft==false)] | first')
            PRE_TAG=$(echo "$PRE" | jq -r '.tag_name // ""')
            PRE_NAME=$(echo "$PRE" | jq -r '.name // ""')
            PRE_BODY=$(echo "$PRE" | jq '.body // ""')

            if [ "$STABLE_TAG" = "$PRE_TAG" ] || [ -z "$PRE_TAG" ] || [ "$PRE_TAG" = "null" ]; then
              MATRIX=$(jq -cn \
                --arg tag "$STABLE_TAG" \
                --arg name "$STABLE_NAME" \
                --argjson body "$STABLE_BODY" \
                '{include:[{tag:$tag, prerelease:false, release_name:$name, release_body:$body}]}')
            else
              MATRIX=$(jq -cn \
                --arg stag "$STABLE_TAG" --arg sname "$STABLE_NAME" --argjson sbody "$STABLE_BODY" \
                --arg ptag "$PRE_TAG"    --arg pname "$PRE_NAME"    --argjson pbody "$PRE_BODY" \
                '{include:[
                  {tag:$stag, prerelease:false, release_name:$sname, release_body:$sbody},
                  {tag:$ptag, prerelease:true,  release_name:$pname, release_body:$pbody}
                ]}')
            fi
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  # ════════════════════════════════════════════════════════════════════════════
  # 2. Linux：x86 / amd64 / arm64
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux ${{ matrix.arch }} — ${{ matrix.release.tag }}
    needs: init
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.init.outputs.matrix).include }}
        arch: [x86, amd64, arm64]

    steps:
      - name: Checkout ntop/n2n @ ${{ matrix.release.tag }}
        uses: actions/checkout@v4
        with:
          repository: ntop/n2n
          ref: ${{ matrix.release.tag }}
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          case "${{ matrix.arch }}" in
            x86)
              sudo apt-get install -y gcc-multilib g++-multilib cmake
              ;;
            amd64)
              sudo apt-get install -y cmake build-essential
              ;;
            arm64)
              sudo apt-get install -y \
                gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake
              ;;
          esac

      - name: Configure & build
        run: |
          mkdir build && cd build
          # -DCMAKE_POLICY_VERSION_MINIMUM=3.5 兼容 n2n 老版本 CMakeLists.txt
          case "${{ matrix.arch }}" in
            x86)
              cmake .. \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DCMAKE_C_FLAGS="-m32" \
                -DCMAKE_EXE_LINKER_FLAGS="-m32" \
                -DCMAKE_BUILD_TYPE=Release
              ;;
            amd64)
              cmake .. \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DCMAKE_BUILD_TYPE=Release
              ;;
            arm64)
              cmake .. \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DCMAKE_SYSTEM_NAME=Linux \
                -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
                -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
                -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
                -DCMAKE_BUILD_TYPE=Release
              ;;
          esac
          cmake --build . --parallel $(nproc)

      - name: Package
        run: |
          TAG="${{ matrix.release.tag }}"
          ARCH="${{ matrix.arch }}"
          OUTDIR="dist/n2n-${TAG}-linux-${ARCH}"
          mkdir -p "$OUTDIR"
          for bin in build/edge build/supernode build/tools/n2n-benchmark; do
            [ -f "$bin" ] && cp "$bin" "$OUTDIR/"
          done
          cd dist
          tar -czf "n2n-${TAG}-linux-${ARCH}.tar.gz" "n2n-${TAG}-linux-${ARCH}/"
          echo "ASSET=dist/n2n-${TAG}-linux-${ARCH}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: n2n-${{ matrix.release.tag }}-linux-${{ matrix.arch }}
          path: ${{ env.ASSET }}
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # 3. Windows amd64（MinGW 交叉编译）
  # ════════════════════════════════════════════════════════════════════════════
  build-windows-amd64:
    name: Windows amd64 — ${{ matrix.release.tag }}
    needs: init
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.init.outputs.matrix).include }}

    steps:
      - name: Checkout ntop/n2n @ ${{ matrix.release.tag }}
        uses: actions/checkout@v4
        with:
          repository: ntop/n2n
          ref: ${{ matrix.release.tag }}
          submodules: recursive

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mingw-w64 cmake

      - name: Configure & build
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_EXE_LINKER_FLAGS="-liphlpapi -lws2_32" \
            -DCMAKE_SHARED_LINKER_FLAGS="-liphlpapi -lws2_32" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel $(nproc)

      - name: Package
        run: |
          TAG="${{ matrix.release.tag }}"
          OUTDIR="dist/n2n-${TAG}-windows-amd64"
          mkdir -p "$OUTDIR"
          for bin in build/edge.exe build/supernode.exe build/tools/n2n-benchmark.exe; do
            [ -f "$bin" ] && cp "$bin" "$OUTDIR/"
          done
          find build -name "*.dll" -exec cp {} "$OUTDIR/" \; 2>/dev/null || true
          cd dist
          zip -r "n2n-${TAG}-windows-amd64.zip" "n2n-${TAG}-windows-amd64/"
          echo "ASSET=dist/n2n-${TAG}-windows-amd64.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: n2n-${{ matrix.release.tag }}-windows-amd64
          path: ${{ env.ASSET }}
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # 4. macOS arm64（Apple Silicon M1+，macos-14 原生 runner）
  # ════════════════════════════════════════════════════════════════════════════
  build-macos-arm64:
    name: macOS arm64 — ${{ matrix.release.tag }}
    needs: init
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.init.outputs.matrix).include }}

    steps:
      - name: Checkout ntop/n2n @ ${{ matrix.release.tag }}
        uses: actions/checkout@v4
        with:
          repository: ntop/n2n
          ref: ${{ matrix.release.tag }}
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake openssl

      - name: Configure & build
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl)" \
            -DCMAKE_C_FLAGS="-Wno-incompatible-function-pointer-types"
          cmake --build . --parallel $(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          TAG="${{ matrix.release.tag }}"
          OUTDIR="dist/n2n-${TAG}-macos-arm64"
          mkdir -p "$OUTDIR"
          for bin in build/edge build/supernode build/tools/n2n-benchmark; do
            [ -f "$bin" ] && cp "$bin" "$OUTDIR/"
          done
          for f in "$OUTDIR"/*; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          cd dist
          tar -czf "n2n-${TAG}-macos-arm64.tar.gz" "n2n-${TAG}-macos-arm64/"
          echo "ASSET=dist/n2n-${TAG}-macos-arm64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: n2n-${{ matrix.release.tag }}-macos-arm64
          path: ${{ env.ASSET }}
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # 5. 汇总：创建 GitHub Release 并上传所有平台产物
  # ════════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release — ${{ matrix.release.tag }}
    needs: [init, build-linux, build-windows-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.init.outputs.matrix).include }}

    steps:
      - name: Download all artifacts for ${{ matrix.release.tag }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: n2n-${{ matrix.release.tag }}-*

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Prepare release body
        run: |
          TAG="${{ matrix.release.tag }}"
          UPSTREAM_BODY="${{ matrix.release.release_body }}"
          {
            echo "## n2n ${TAG} — 多平台预编译二进制"
            echo ""
            echo "本 Release 由 GitHub Actions 自动从 [ntop/n2n](https://github.com/ntop/n2n/releases/tag/${TAG}) 编译生成。"
            echo ""
            echo "### 平台支持"
            echo "| 平台    | 架构   | 文件 |"
            echo "|---------|--------|------|"
            echo "| Linux   | x86    | \`n2n-${TAG}-linux-x86.tar.gz\`      |"
            echo "| Linux   | amd64  | \`n2n-${TAG}-linux-amd64.tar.gz\`    |"
            echo "| Linux   | arm64  | \`n2n-${TAG}-linux-arm64.tar.gz\`    |"
            echo "| Windows | amd64  | \`n2n-${TAG}-windows-amd64.zip\`     |"
            echo "| macOS   | arm64 (M1+) | \`n2n-${TAG}-macos-arm64.tar.gz\` |"
            echo ""
            echo "---"
            echo ""
            echo "### 上游 Release 说明"
            echo ""
            echo "${UPSTREAM_BODY}"
          } > release_body.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release.tag }}
          name: ${{ matrix.release.release_name || matrix.release.tag }}
          body_path: release_body.md
          prerelease: ${{ matrix.release.prerelease }}
          draft: false
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
